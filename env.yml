# Reproducible environment for pymol-mcp.
# PyMOL open-source is conda-only; the server MUST run in this interpreter.
#
#   conda env create -f env.yml           # creates env `pymol-mcp`
#   conda activate pymol-mcp
#   pip install -e ".[md,dev]"
#
# (On this machine the existing conda env `viz` already satisfies these and is used directly.)
name: pymol-mcp
channels:
  - conda-forge
dependencies:
  - python>=3.11
  - pymol-open-source>=3.0
  - numpy>=1.24
  - scipy>=1.11
  - pip
  - pip:
      - fastmcp>=3.4.0
      - MDAnalysis>=2.7
